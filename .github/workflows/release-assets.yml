# Публикация релиза ассетов.
#
# Триггер: merge в main, меняющий файл VERSION (обычно релизный PR:
# tools/sync_assets.sh + бамп VERSION). Можно запустить и вручную
# (workflow_dispatch) - тогда возьмётся текущий VERSION из main.
#
# Что делает:
#   1. Собирает models_v<VERSION>.zip из assets/ (tools/build_release_zip.sh).
#   2. Создаёт GitHub Release с тегом v<VERSION>, прикладывает архив и
#      assets-manifest.json (готовый файл для ascendancy-remake).
#   3. Если в секретах задан REMAKE_TRIGGER_TOKEN (PAT с правом workflow
#      на mikeasm48/ascendancy-remake), запускает там workflow
#      update-assets.yml, который откроет PR с обновлённым манифестом.
name: Release assets

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Fail if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Релиз v${VERSION} уже существует - поднимите VERSION." >&2
            exit 1
          fi

      - name: Build archive and manifest
        run: tools/build_release_zip.sh "${{ steps.version.outputs.version }}" build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "build/models_v${VERSION}.zip" \
            "build/assets-manifest.json" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Assets ${VERSION}" \
            --notes "Бандл моделей v${VERSION}, собран из assets/ (коммит ${GITHUB_SHA})."

      - name: Trigger manifest update in ascendancy-remake
        env:
          TRIGGER_TOKEN: ${{ secrets.REMAKE_TRIGGER_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$TRIGGER_TOKEN" ]; then
            echo "Секрет REMAKE_TRIGGER_TOKEN не задан."
            echo "Запустите вручную: gh workflow run update-assets.yml -R mikeasm48/ascendancy-remake -f version=${VERSION}"
            exit 0
          fi
          # --ref обязателен: без него gh сначала запрашивает
          # default branch через GraphQL (repository.defaultBranchRef),
          # а это требует прав Contents, которых у REMAKE_TRIGGER_TOKEN
          # нет (только Actions: write + Metadata: read) - именно так и
          # задумано, минимум прав.
          GH_TOKEN="$TRIGGER_TOKEN" gh workflow run update-assets.yml \
            --repo mikeasm48/ascendancy-remake \
            --ref main \
            -f version="${VERSION}"
