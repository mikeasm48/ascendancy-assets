# Подключение опубликованного релиза ассетов к ascendancy-remake.
#
# Сборка zip и публикация GitHub Release происходят ЛОКАЛЬНО
# (tools/release.sh) - CI-раннер не имеет доступа к ~/.ascendancy/assets,
# и держать её снимок в git-истории раздувало репозиторий на полный
# объём бандла на каждый релиз (assets/ больше не отслеживается git,
# см. .gitignore). Этот workflow только реагирует на уже опубликованный
# релиз и просит ascendancy-remake подтянуть новый манифест.
name: Notify remake of new assets release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Версия релиза (например 1.0.1). Пусто = взять из VERSION."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  notify-remake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Версия: $VERSION"

      - name: Trigger manifest update in ascendancy-remake
        env:
          TRIGGER_TOKEN: ${{ secrets.REMAKE_TRIGGER_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$TRIGGER_TOKEN" ]; then
            echo "Секрет REMAKE_TRIGGER_TOKEN не задан."
            echo "Запустите вручную: gh workflow run update-assets.yml -R mikeasm48/ascendancy-remake --ref main -f version=${VERSION}"
            exit 0
          fi
          # --ref обязателен: без него gh сначала запрашивает
          # default branch через GraphQL (repository.defaultBranchRef),
          # а это требует прав Contents, которых у REMAKE_TRIGGER_TOKEN
          # нет (только Actions: write + Metadata: read) - именно так и
          # задумано, минимум прав.
          GH_TOKEN="$TRIGGER_TOKEN" gh workflow run update-assets.yml \
            --repo mikeasm48/ascendancy-remake \
            --ref main \
            -f version="${VERSION}"
